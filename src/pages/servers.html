<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidores</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Servidores</h1>
        <p>Lista de servidores onde você tem permissões administrativas:</p>
        <ul id="guildsList">
            <!-- Guilds will be inserted here -->
        </ul>
        <a href="./dashboard.html" class="btn">Voltar</a>
    </div>
    <script src="../assets/js/script.js"></script>
    <script>
        const API_BASE = getApiBase();
        
        // Capturar token da URL se vindo do login
        const urlParams = new URLSearchParams(window.location.search);
        const tokenFromUrl = urlParams.get('token');
        if (tokenFromUrl) {
            localStorage.setItem('access_token', tokenFromUrl);
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        
        const token = localStorage.getItem('access_token');

        if (!token) {
            window.location.href = './home.html';
        }

        async function loadServers() {
            try {
                const response = await fetch(`${API_BASE}/servers`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                if (!response.ok) throw new Error('Failed to load servers');
                const data = await response.json();
                const ul = document.getElementById('guildsList');
                data.guilds.forEach(guild => {
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${guild.name}</strong> (ID: ${guild.id})`;
                    ul.appendChild(li);
                });
            } catch (error) {
                console.error(error);
                alert('Erro ao carregar servidores');
            }
        }

        loadServers();
    </script>
</body>
</html>
