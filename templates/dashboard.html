<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Principal</title>
    <link rel="icon" href="./static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Painel Principal</h1>
        <p id="welcome">Carregando...</p>
        <nav>
            <a href="./servers.html">Servidores</a>
            <a href="./commands.html">Comandos</a>
            <a id="adminLink" style="display:none;" href="./admin.html">Admin</a>
        </nav>
        
        <h2>Apoiadores</h2>
        <table id="apoiadoresTable">
            <thead>
                <tr>
                    <th>ID Discord</th>
                    <th>Tipo de Apoio</th>
                    <th>Status</th>
                    <th>Expiração</th>
                </tr>
            </thead>
            <tbody id="apoiadoresBody">
                <!-- Data will be inserted here -->
            </tbody>
        </table>
    </div>
    <script src="./static/js/script.js"></script>
    <script>
        const API_BASE = 'https://your-api-domain.com';
        const token = localStorage.getItem('access_token'); // Assume token is stored after login

        if (!token) {
            window.location.href = './home.html';
        }

        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/dashboard`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (!response.ok) throw new Error('Failed to load dashboard');
                const data = await response.json();
                document.getElementById('welcome').textContent = `Bem-vindo, ${data.user.username}!`;
                if (data.user.admin) {
                    document.getElementById('adminLink').style.display = 'inline';
                }
                const tbody = document.getElementById('apoiadoresBody');
                data.apoiadores.forEach(apoiador => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${apoiador.discord_id}</td>
                        <td>${apoiador.tipo_apoio}</td>
                        <td class="status-${apoiador.ativo ? 'ativo' : 'inativo'}">${apoiador.ativo ? 'Ativo' : 'Inativo'}</td>
                        <td>${apoiador.data_expiracao ? new Date(apoiador.data_expiracao).toLocaleDateString('pt-BR') : '-'}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error(error);
                alert('Erro ao carregar dashboard');
            }
        }

        loadDashboard();
    </script>
</body>
</html>
